<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Endpoint Tester | Book My Ticket</title>
    <style>
      @import url("https://fonts.googleapis.com/css2?family=Fraunces:opsz,wght@9..144,500;9..144,700&family=Space+Grotesk:wght@400;500;700&display=swap");

      :root {
        --bg: #fbf6ec;
        --bg-2: #efe4d2;
        --ink: #153147;
        --ink-soft: #456277;
        --brand: #0c7f76;
        --brand-2: #ea8a3f;
        --ok: #1d8a61;
        --bad: #b7445d;
        --card: rgba(255, 255, 255, 0.78);
        --line: rgba(19, 42, 62, 0.14);
        --shadow: 0 12px 36px rgba(18, 49, 71, 0.14);
      }

      * {
        box-sizing: border-box;
      }

      body {
        margin: 0;
        min-height: 100vh;
        font-family: "Space Grotesk", sans-serif;
        color: var(--ink);
        background:
          radial-gradient(circle at 10% 8%, #ffe4b6 0 14%, transparent 15%),
          radial-gradient(circle at 92% 80%, #b7efe9 0 18%, transparent 19%),
          linear-gradient(145deg, var(--bg) 0%, var(--bg-2) 100%);
        padding: 22px;
      }

      .page {
        max-width: 1080px;
        margin: 0 auto;
        display: grid;
        gap: 16px;
      }

      .card {
        background: var(--card);
        border: 1px solid var(--line);
        border-radius: 18px;
        padding: 18px;
        backdrop-filter: blur(7px);
        box-shadow: var(--shadow);
      }

      .topbar {
        display: flex;
        justify-content: space-between;
        align-items: center;
        gap: 12px;
        flex-wrap: wrap;
      }

      h1 {
        margin: 0;
        font-family: "Fraunces", serif;
        font-size: clamp(1.6rem, 3vw, 2.4rem);
        letter-spacing: -0.02em;
      }

      h2 {
        margin: 0 0 12px;
        font-family: "Fraunces", serif;
      }

      .muted {
        margin: 8px 0 0;
        color: var(--ink-soft);
      }

      .row {
        display: flex;
        gap: 10px;
        flex-wrap: wrap;
      }

      .grid {
        display: grid;
        gap: 10px;
        grid-template-columns: repeat(auto-fit, minmax(180px, 1fr));
      }

      label {
        display: grid;
        gap: 6px;
        font-weight: 600;
        font-size: 0.92rem;
      }

      input {
        border-radius: 10px;
        border: 1px solid var(--line);
        padding: 10px 12px;
        font: inherit;
        background: rgba(255, 255, 255, 0.95);
      }

      button,
      a.button-link {
        border: none;
        border-radius: 10px;
        font: inherit;
        font-weight: 700;
        padding: 10px 14px;
        cursor: pointer;
        text-decoration: none;
        display: inline-flex;
        align-items: center;
        justify-content: center;
        transition:
          transform 140ms ease,
          filter 140ms ease;
      }

      button:hover,
      a.button-link:hover {
        transform: translateY(-1px);
        filter: saturate(1.06);
      }

      .primary {
        background: linear-gradient(130deg, var(--brand), #0fa196);
        color: #f3fffe;
      }

      .secondary {
        background: linear-gradient(130deg, var(--brand-2), #ffad66);
        color: #3c2608;
      }

      .ghost {
        background: rgba(255, 255, 255, 0.8);
        color: var(--ink-soft);
        border: 1px solid var(--line);
      }

      .session-pill {
        border-radius: 999px;
        border: 1px solid rgba(12, 127, 118, 0.3);
        background: rgba(12, 127, 118, 0.1);
        padding: 8px 12px;
        font-weight: 600;
        color: var(--brand);
      }

      .endpoint-list {
        display: grid;
        gap: 10px;
      }

      .endpoint-item {
        border: 1px solid var(--line);
        border-radius: 12px;
        background: rgba(255, 255, 255, 0.9);
        padding: 12px;
        display: grid;
        grid-template-columns: 1fr auto;
        align-items: center;
        gap: 12px;
      }

      .endpoint-item h3 {
        margin: 0 0 6px;
        font-size: 1rem;
      }

      .endpoint-result {
        grid-column: 1 / -1;
        margin: 0;
        border-radius: 10px;
        border: 1px solid var(--line);
        background: #fcf9f3;
        padding: 10px;
        min-height: 80px;
        max-height: 260px;
        overflow: auto;
        font-size: 0.82rem;
        line-height: 1.42;
        white-space: pre-wrap;
      }

      .endpoint-path {
        display: inline-block;
        margin-top: 5px;
        padding: 3px 8px;
        border-radius: 999px;
        border: 1px solid var(--line);
        font-size: 0.82rem;
        color: var(--ink-soft);
        background: rgba(255, 255, 255, 0.95);
        word-break: break-all;
      }

      .method,
      .auth-tag {
        display: inline-block;
        border-radius: 999px;
        padding: 3px 8px;
        font-size: 0.76rem;
        font-weight: 700;
        letter-spacing: 0.04em;
        margin-right: 7px;
      }

      .method.get {
        background: rgba(29, 138, 97, 0.14);
        color: #166347;
      }

      .method.post {
        background: rgba(12, 127, 118, 0.14);
        color: #0b5a55;
      }

      .method.put {
        background: rgba(234, 138, 63, 0.14);
        color: #6b3812;
      }

      .auth-tag {
        background: rgba(183, 68, 93, 0.12);
        color: #7a2237;
      }

      .status {
        border-radius: 12px;
        border: 1px solid var(--line);
        padding: 10px 12px;
        color: var(--ink-soft);
        background: rgba(255, 255, 255, 0.8);
      }

      .status.ok {
        border-color: rgba(29, 138, 97, 0.4);
        background: rgba(29, 138, 97, 0.1);
        color: #0f5c40;
      }

      .status.error {
        border-color: rgba(183, 68, 93, 0.4);
        background: rgba(183, 68, 93, 0.1);
        color: #7a2237;
      }

      @media (max-width: 860px) {
        .endpoint-item {
          grid-template-columns: 1fr;
        }
      }

      @media (max-width: 560px) {
        body {
          padding: 14px;
        }
      }
    </style>
  </head>
  <body>
    <main class="page">
      <section class="card topbar">
        <div>
          <h1>Endpoint Tester</h1>
          <p class="muted">
            Run and inspect backend routes in a dedicated screen.
          </p>
        </div>
        <div class="row">
          <a class="button-link ghost" href="/">Back To Booking UI</a>
          <div class="session-pill" id="session-pill">Not logged in</div>
        </div>
      </section>

      <section class="card">
        <h2>Request Inputs</h2>
        <div class="grid">
          <label>
            Name
            <input id="name-input" type="text" maxlength="100" value="Guest" />
          </label>
          <label>
            Email
            <input id="email-input" type="email" value="tester@example.com" />
          </label>
          <label>
            Password
            <input id="password-input" type="password" value="secret123" />
          </label>
          <label>
            Movie ID
            <input id="movie-id-input" type="number" min="1" value="1" />
          </label>
          <label>
            Seat Number
            <input id="seat-number-input" type="number" min="1" value="1" />
          </label>
          <label>
            Legacy Seat ID
            <input id="legacy-seat-id-input" type="number" min="1" value="1" />
          </label>
        </div>
        <div class="row" style="margin-top: 12px">
          <button class="ghost" id="refresh-session-btn" type="button">
            Refresh Session
          </button>
          <button class="secondary" id="clear-session-btn" type="button">
            Clear Session
          </button>
        </div>
      </section>

      <section class="card">
        <h2>Endpoints</h2>
        <div class="status" id="status-box" aria-live="polite">
          Ready to run endpoint tests.
        </div>
        <div class="endpoint-list" id="endpoint-list"></div>
      </section>
    </main>

    <script>
      const STORAGE_TOKEN_KEY = "bmt_token";
      const STORAGE_USER_KEY = "bmt_user";

      const state = {
        token: "",
        user: null,
        endpointResults: {},
      };

      const ENDPOINT_TESTS = [
        {
          id: "register",
          label: "Register User",
          description: "Create a new user with name, email and password.",
          method: "POST",
          path: () => "/auth/register",
          body: (ctx) => ({
            name: ctx.name,
            email: ctx.email,
            password: ctx.password,
          }),
          saveSession: true,
        },
        {
          id: "login",
          label: "Login User",
          description: "Login and store JWT in localStorage.",
          method: "POST",
          path: () => "/auth/login",
          body: (ctx) => ({ email: ctx.email, password: ctx.password }),
          saveSession: true,
        },
        {
          id: "movies",
          label: "Get Movies",
          description: "Returns mocked movie metadata.",
          method: "GET",
          path: () => "/movies",
        },
        {
          id: "movieSeats",
          label: "Get Seats By Movie",
          description: "Loads seat map for selected movie id.",
          method: "GET",
          path: (ctx) => `/movies/${ctx.movieId}/seats`,
        },
        {
          id: "myBookings",
          label: "Get My Bookings",
          description: "Protected endpoint for current logged-in user.",
          method: "GET",
          requiresAuth: true,
          path: () => "/me/bookings",
        },
        {
          id: "bookSeat",
          label: "Book Seat",
          description: "Protected booking endpoint using seat number.",
          method: "POST",
          requiresAuth: true,
          path: (ctx) => `/movies/${ctx.movieId}/bookings`,
          body: (ctx) => ({ seatNumber: ctx.seatNumber }),
        },
        {
          id: "legacySeats",
          label: "Legacy Seats",
          description: "Original route that returns movie_id=1 seats.",
          method: "GET",
          path: () => "/seats",
        },
        {
          id: "legacyBook",
          label: "Legacy Book Seat",
          description: "Original route booking by seat id and name.",
          method: "PUT",
          path: (ctx) => `/${ctx.legacySeatId}/${encodeURIComponent(ctx.name)}`,
        },
      ];

      const els = {
        sessionPill: document.getElementById("session-pill"),
        nameInput: document.getElementById("name-input"),
        emailInput: document.getElementById("email-input"),
        passwordInput: document.getElementById("password-input"),
        movieIdInput: document.getElementById("movie-id-input"),
        seatNumberInput: document.getElementById("seat-number-input"),
        legacySeatIdInput: document.getElementById("legacy-seat-id-input"),
        refreshSessionBtn: document.getElementById("refresh-session-btn"),
        clearSessionBtn: document.getElementById("clear-session-btn"),
        endpointList: document.getElementById("endpoint-list"),
        statusBox: document.getElementById("status-box"),
      };

      function setStatus(message, type = "info") {
        els.statusBox.textContent = message;
        els.statusBox.classList.remove("ok", "error");

        if (type === "ok") {
          els.statusBox.classList.add("ok");
        } else if (type === "error") {
          els.statusBox.classList.add("error");
        }
      }

      function hydrateSession() {
        state.token = localStorage.getItem(STORAGE_TOKEN_KEY) || "";
        const rawUser = localStorage.getItem(STORAGE_USER_KEY);
        state.user = rawUser ? JSON.parse(rawUser) : null;
      }

      function persistSession() {
        if (state.token && state.user) {
          localStorage.setItem(STORAGE_TOKEN_KEY, state.token);
          localStorage.setItem(STORAGE_USER_KEY, JSON.stringify(state.user));
        } else {
          localStorage.removeItem(STORAGE_TOKEN_KEY);
          localStorage.removeItem(STORAGE_USER_KEY);
        }
      }

      function renderSession() {
        if (state.token && state.user) {
          els.sessionPill.textContent = `Logged in as ${state.user.name}`;
          els.nameInput.value = state.user.name;
          els.emailInput.value = state.user.email;
        } else {
          els.sessionPill.textContent = "Not logged in";
        }
      }

      function getContext() {
        return {
          name: els.nameInput.value.trim() || "Guest",
          email: els.emailInput.value.trim(),
          password: els.passwordInput.value,
          movieId: Number(els.movieIdInput.value) || 1,
          seatNumber: Number(els.seatNumberInput.value) || 1,
          legacySeatId: Number(els.legacySeatIdInput.value) || 1,
        };
      }

      function renderEndpointList() {
        const context = getContext();
        els.endpointList.innerHTML = "";

        ENDPOINT_TESTS.forEach((test) => {
          const path = test.path(context);
          const lastResult =
            state.endpointResults[test.id] ||
            "No endpoint test run for this route yet.";
          const item = document.createElement("article");
          item.className = "endpoint-item";

          item.innerHTML = `
            <div>
              <h3>${test.label}</h3>
              <div>
                <span class="method ${test.method.toLowerCase()}">${test.method}</span>
                ${test.requiresAuth ? '<span class="auth-tag">Auth Required</span>' : ""}
              </div>
              <span class="endpoint-path">${path}</span>
              <p class="muted">${test.description}</p>
            </div>
            <button class="primary" type="button" data-endpoint-id="${test.id}">Run</button>
            <pre class="endpoint-result" data-endpoint-output="${test.id}">${lastResult}</pre>
          `;

          els.endpointList.appendChild(item);
        });
      }

      function setEndpointResult(endpointId, content) {
        state.endpointResults[endpointId] = content;
        const resultEl = els.endpointList.querySelector(
          `[data-endpoint-output="${endpointId}"]`,
        );

        if (resultEl) {
          resultEl.textContent = content;
        }
      }

      async function runEndpointTest(endpointId) {
        const test = ENDPOINT_TESTS.find((entry) => entry.id === endpointId);
        if (!test) {
          return;
        }

        const context = getContext();
        const path = test.path(context);
        const payload = test.body ? test.body(context) : undefined;

        if (test.requiresAuth && !state.token) {
          const result = {
            request: {
              method: test.method,
              path,
              body: payload,
              authTokenUsed: false,
            },
            response: {
              status: 401,
              ok: false,
              error: "Login required to test this endpoint.",
            },
          };

          setEndpointResult(endpointId, JSON.stringify(result, null, 2));
          setStatus("Login required for this endpoint.", "error");
          return;
        }

        const headers = {};
        if (payload) {
          headers["Content-Type"] = "application/json";
        }
        if (test.requiresAuth && state.token) {
          headers.Authorization = `Bearer ${state.token}`;
        }

        const requestOptions = {
          method: test.method,
          headers,
        };

        if (payload) {
          requestOptions.body = JSON.stringify(payload);
        }

        setEndpointResult(endpointId, `Running ${test.method} ${path} ...`);

        try {
          const response = await fetch(path, requestOptions);
          const text = await response.text();
          let body;

          try {
            body = text ? JSON.parse(text) : {};
          } catch {
            body = text;
          }

          if (
            response.ok &&
            test.saveSession &&
            body &&
            body.token &&
            body.user
          ) {
            state.token = body.token;
            state.user = body.user;
            persistSession();
            renderSession();
          }

          const result = {
            request: {
              method: test.method,
              path,
              body: payload,
              authTokenUsed: Boolean(test.requiresAuth && state.token),
            },
            response: {
              status: response.status,
              ok: response.ok,
              body,
            },
          };

          setEndpointResult(endpointId, JSON.stringify(result, null, 2));
          setStatus(
            `${test.label} ${response.ok ? "succeeded" : "failed"} (${response.status}).`,
            response.ok ? "ok" : "error",
          );
        } catch (error) {
          const result = {
            request: {
              method: test.method,
              path,
              body: payload,
              authTokenUsed: Boolean(test.requiresAuth && state.token),
            },
            response: {
              status: "NETWORK_ERROR",
              ok: false,
              error: error.message,
            },
          };

          setEndpointResult(endpointId, JSON.stringify(result, null, 2));
          setStatus(`Endpoint test failed: ${error.message}`, "error");
        }
      }

      function bindEvents() {
        [
          els.nameInput,
          els.emailInput,
          els.passwordInput,
          els.movieIdInput,
          els.seatNumberInput,
          els.legacySeatIdInput,
        ].forEach((input) => {
          input.addEventListener("input", renderEndpointList);
        });

        els.endpointList.addEventListener("click", (event) => {
          if (!(event.target instanceof Element)) {
            return;
          }

          const button = event.target.closest("button[data-endpoint-id]");
          if (!button) {
            return;
          }

          runEndpointTest(button.dataset.endpointId);
        });

        els.refreshSessionBtn.addEventListener("click", () => {
          hydrateSession();
          renderSession();
          renderEndpointList();
          setStatus("Session refreshed from localStorage.", "ok");
        });

        els.clearSessionBtn.addEventListener("click", () => {
          state.token = "";
          state.user = null;
          persistSession();
          renderSession();
          setStatus("Saved session cleared.", "ok");
        });
      }

      function bootstrap() {
        hydrateSession();
        renderSession();
        renderEndpointList();
        bindEvents();
      }

      bootstrap();
    </script>
  </body>
</html>
